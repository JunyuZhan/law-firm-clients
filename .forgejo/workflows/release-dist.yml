name: Release Dist Center

on:
  push:
    tags:
      - "v*"
      - "release-*"
  workflow_dispatch:
    inputs:
      version:
        description: "Version/tag to publish into dist-center"
        required: false
        type: string

permissions:
  contents: read

jobs:
  sync-and-deploy:
    runs-on: self-hosted
    env:
      DIST_ROOT: /opt/dist-center
      DIST_PROJECT: law-firm-clients
      DIST_DEPLOY: "true"
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Resolve Release Version
        id: version
        shell: bash
        run: |
          set -euo pipefail
          VERSION_INPUT="${{ github.event.inputs.version }}"
          if [ -n "${VERSION_INPUT:-}" ]; then
            VERSION="$VERSION_INPUT"
          elif [ "${GITHUB_REF_TYPE:-}" = "tag" ]; then
            VERSION="${GITHUB_REF_NAME}"
          else
            VERSION="manual-$(date +%Y%m%d%H%M%S)"
          fi
          echo "version=$VERSION" >> "$GITHUB_OUTPUT"

      - name: Sync and Update Dist Center
        shell: bash
        run: |
          set -euo pipefail
          
          cat << 'EOF' > .ci-dist.sh
          apk add --no-cache bash python3 rsync
          
          bash scripts/release/sync-dist-center.sh
          
          bash scripts/release/update-dist-version.sh \
            --dist-root "$DIST_ROOT" \
            --project "$DIST_PROJECT" \
            --version "$VERSION" \
            --app-version "$VERSION" \
            --snapshot
          EOF
          
          tar -c --exclude=.git . | docker run -i --rm \
            -v "$DIST_ROOT:$DIST_ROOT" \
            -e DIST_ROOT="$DIST_ROOT" \
            -e DIST_PROJECT="$DIST_PROJECT" \
            -e PROJECT_SLUG="$DIST_PROJECT" \
            -e VERSION="${{ steps.version.outputs.version }}" \
            alpine:latest sh -c "mkdir -p /workspace && cd /workspace && tar -x && sh .ci-dist.sh"
            
          rm -f .ci-dist.sh

      - name: Deploy Dist Center
        if: ${{ env.DIST_DEPLOY == 'true' }}
        shell: bash
        run: |
          set -euo pipefail
          docker run --rm \
            -v /var/run/docker.sock:/var/run/docker.sock \
            -v "$DIST_ROOT:$DIST_ROOT" \
            -w "$DIST_ROOT" \
            docker:cli compose up --build -d
