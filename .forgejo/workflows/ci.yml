name: Auto CI

on:
  push:
    branches:
      - "**"
    tags:
      - "v*"
      - "release-*"
  workflow_dispatch:

permissions:
  contents: read

jobs:
  verify:
    if: ${{ !startsWith(github.ref, 'refs/tags/') }}
    runs-on: self-hosted
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Verify Project
        shell: bash
        run: |
          set -euo pipefail
          ROOT_DIR="$(pwd)"

          has_package_script() {
            node -e "
            const fs = require('fs');
            try {
              const data = JSON.parse(fs.readFileSync(process.argv[1], 'utf8'));
              process.exit(data.scripts && data.scripts[process.argv[2]] ? 0 : 1);
            } catch(e) {
              process.exit(1);
            }
            " "$1" "$2"
          }

          run_in_container() {
            local image="$1"
            local workdir="$2"
            local command="$3"
            echo "==> Running in disposable container ($image): $command"
            echo "$command" > .ci-cmd.sh
            tar -c --exclude=.git --exclude=node_modules --exclude=target --exclude=dist . | docker run -i --rm "$image" sh -c "
              mkdir -p /workspace
              cd /workspace
              tar -x
              cd \"$workdir\"
              sh -l /workspace/.ci-cmd.sh
            "
            rm -f .ci-cmd.sh
          }

          run_node_project() {
            local dir="$1"
            local pkg="${dir}/package.json"
            [ -f "$pkg" ] || return 0

            # 修正传入脚本的路径（使用绝对路径，因为是在宿主机运行这段 JS）
            local abs_pkg="${ROOT_DIR}/${pkg}"
            local install_cmd="npm install --no-fund --no-audit"
            local run_lint="true"
            local run_test="true"
            local run_build="true"
            local run_typecheck="true"

            if [ -f "${dir}/package-lock.json" ]; then
              install_cmd="npm ci --no-fund --no-audit || npm install --no-fund --no-audit"
            elif [ -f "${dir}/pnpm-lock.yaml" ]; then
              install_cmd="corepack enable && pnpm install --frozen-lockfile || pnpm install"
              run_lint="pnpm lint"
              run_test="pnpm test"
              run_build="pnpm build"
              run_typecheck="pnpm typecheck"
            elif [ -f "${dir}/yarn.lock" ]; then
              install_cmd="corepack enable && yarn install --immutable || yarn install"
              run_lint="yarn lint"
              run_test="yarn test"
              run_build="yarn build"
              run_typecheck="yarn typecheck"
            else
              run_lint="npm run lint"
              run_test="npm run test"
              run_build="npm run build"
              run_typecheck="npm run typecheck"
            fi

            echo "==> Node project: ${dir}"
            local cmd="${install_cmd}"
            if has_package_script "$abs_pkg" lint; then cmd="${cmd} && ${run_lint}"; fi
            if has_package_script "$abs_pkg" test; then cmd="${cmd} && ${run_test}"; fi
            if has_package_script "$abs_pkg" build; then cmd="${cmd} && ${run_build}"; fi
            if has_package_script "$abs_pkg" typecheck; then cmd="${cmd} && ${run_typecheck}"; fi
            run_in_container "node:20-alpine" "$dir" "$cmd"
          }

          run_python_project() {
            local dir="$1"
            [ -f "${dir}/requirements.txt" ] || [ -f "${dir}/pyproject.toml" ] || return 0
            echo "==> Python project: ${dir}"
            run_in_container "python:3.11-alpine" "$dir" '
              set -e
              python -m pip install --upgrade pip setuptools wheel
              if [ -f requirements.txt ]; then pip install -r requirements.txt; fi
              if [ -f pyproject.toml ]; then pip install -e .; fi
              pip install pytest >/dev/null 2>&1 || true
              if find . -maxdepth 2 \( -name "test_*.py" -o -name "*_test.py" \) | grep -q .; then
                pytest -q || python -m compileall .
              else
                python -m compileall .
              fi
            '
          }

          run_maven_project() {
            local dir="$1"
            [ -f "${dir}/pom.xml" ] || return 0
            echo "==> Maven project: ${dir}"
            run_in_container "maven:3.9-eclipse-temurin-21" "$dir" "mvn -B -ntp test"
          }

          run_go_project() {
            local dir="$1"
            [ -f "${dir}/go.mod" ] || return 0
            echo "==> Go project: ${dir}"
            run_in_container "golang:1.22-alpine" "$dir" "go test ./... && go build ./..."
          }

          run_node_project "."
          run_node_project "frontend"
          run_node_project "backend"
          run_node_project "server"
          run_node_project "ui"
          run_node_project "web"
          run_node_project "cli"
          run_node_project "gitnexus"
          run_node_project "gitnexus-web"
          run_node_project "zh-control-panel"

          run_python_project "."
          run_python_project "backend"
          run_python_project "src"
          run_python_project "eval"

          run_maven_project "."
          run_maven_project "backend"

          run_go_project "."

  release:
    if: ${{ startsWith(github.ref, 'refs/tags/') }}
    runs-on: self-hosted
    env:
      REGISTRY_HOST: ${{ vars.REGISTRY_HOST }}
      REGISTRY_NAMESPACE: ${{ vars.REGISTRY_NAMESPACE }}
      REGISTRY_USERNAME: ${{ secrets.REGISTRY_USERNAME }}
      REGISTRY_PASSWORD: ${{ secrets.REGISTRY_PASSWORD }}
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Build And Push Image
        shell: bash
        run: |
          set -euo pipefail
          REGISTRY_HOST="${REGISTRY_HOST:-192.168.50.5:5050}"
          REGISTRY_NAMESPACE="${REGISTRY_NAMESPACE:-albert}"
          REPO_NAME="${GITHUB_REPOSITORY##*/}"
          TAG="${GITHUB_REF_NAME:-${GITHUB_REF##*/}}"

          if [ -z "${REGISTRY_USERNAME:-}" ] || [ -z "${REGISTRY_PASSWORD:-}" ]; then
            echo "Missing REGISTRY_USERNAME / REGISTRY_PASSWORD secrets."
            exit 1
          fi

          echo "${REGISTRY_PASSWORD}" | docker login "${REGISTRY_HOST}" -u "${REGISTRY_USERNAME}" --password-stdin

          build_and_push() {
            local image_name="$1"
            local context_dir="$2"
            local dockerfile_path="$3"
            local full_image="${REGISTRY_HOST}/${REGISTRY_NAMESPACE}/${image_name}:${TAG}"
            echo "==> Building ${full_image}"
            docker build -f "${dockerfile_path}" -t "${full_image}" "${context_dir}"
            docker push "${full_image}"
          }

          if [ -f ".forgejo/images.txt" ]; then
            while IFS='|' read -r image_name context_dir dockerfile_path; do
              [ -n "${image_name}" ] || continue
              build_and_push "${image_name}" "${context_dir}" "${dockerfile_path}"
            done < .forgejo/images.txt
          elif [ -f "Dockerfile" ]; then
            build_and_push "${REPO_NAME}" "." "Dockerfile"
          elif [ -f "docker/Dockerfile" ]; then
            build_and_push "${REPO_NAME}" "." "docker/Dockerfile"
          else
            echo "No Docker release mapping found. Add .forgejo/images.txt to enable tag-based publishing."
          fi
