name: CI

on:
  push:
    branches: [ feature/client-service-system, main, master ]
  pull_request:
    branches: [ feature/client-service-system, main, master ]

jobs:
  test:
    runs-on: ubuntu-latest
    
    services:
      postgres:
        image: postgres:15
        env:
          POSTGRES_PASSWORD: postgres
          POSTGRES_DB: client_service_test
        options: >-
          --health-cmd pg_isready
          --health-interval 10s
          --health-timeout 5s
          --health-retries 5
        ports:
          - 5432:5432
      redis:
        image: redis:7
        options: >-
          --health-cmd "redis-cli ping"
          --health-interval 10s
          --health-timeout 5s
          --health-retries 5
        ports:
          - 6379:6379

    steps:
    - uses: actions/checkout@v4
    
    - name: Set up JDK 21
      uses: actions/setup-java@v4
      with:
        java-version: '21'
        distribution: 'temurin'
        cache: maven
    
    - name: Set up Node.js
      uses: actions/setup-node@v4
      with:
        node-version: '20'
        cache: 'npm'
        cache-dependency-path: frontend/package-lock.json
    
    - name: Cache Maven dependencies
      uses: actions/cache@v4
      with:
        path: ~/.m2
        key: ${{ runner.os }}-m2-${{ hashFiles('**/pom.xml') }}
        restore-keys: ${{ runner.os }}-m2
    
    - name: Cache Node dependencies
      uses: actions/cache@v4
      with:
        path: frontend/node_modules
        key: ${{ runner.os }}-node-${{ hashFiles('frontend/package-lock.json') }}
        restore-keys: ${{ runner.os }}-node
    
    - name: Verify backend
      working-directory: backend
      env:
        SPRING_PROFILES_ACTIVE: test
        DATABASE_URL: jdbc:postgresql://localhost:5432/client_service_test
        REDIS_HOST: localhost
        REDIS_PORT: 6379
      run: |
        mvn clean verify -B
    
    - name: Install frontend dependencies
      working-directory: frontend
      run: |
        npm ci

    - name: Lint frontend
      working-directory: frontend
      run: |
        npm run lint

    - name: Typecheck frontend
      working-directory: frontend
      run: |
        npm run typecheck

    - name: Build frontend
      working-directory: frontend
      run: |
        npm run build
    
    - name: Run frontend tests
      working-directory: frontend
      run: |
        npm run test:run
