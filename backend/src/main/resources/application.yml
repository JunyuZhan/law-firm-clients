spring:
  application:
    name: client-service
  
  # 数据源配置
  datasource:
    driver-class-name: org.postgresql.Driver
    url: ${SPRING_DATASOURCE_URL:jdbc:postgresql://localhost:5433/client_service}
    username: ${SPRING_DATASOURCE_USERNAME:postgres}
    password: ${SPRING_DATASOURCE_PASSWORD:postgres}
    hikari:
      maximum-pool-size: 20
      minimum-idle: 5
      connection-timeout: 30000
      idle-timeout: 600000
      max-lifetime: 1800000

  # Redis配置
  data:
    redis:
      host: ${SPRING_REDIS_HOST:localhost}
      port: ${SPRING_REDIS_PORT:6380}
      password: ${SPRING_REDIS_PASSWORD:}
      database: ${SPRING_REDIS_DATABASE:0}
      timeout: 3000ms
      lettuce:
        pool:
          max-active: 8
          max-idle: 8
          min-idle: 0
          max-wait: -1ms

  # MyBatis-Plus配置
  mybatis-plus:
    mapper-locations: classpath*:/mapper/**/*.xml
    type-aliases-package: com.clientservice.domain.entity
    configuration:
      map-underscore-to-camel-case: true
      # 开发环境使用 slf4j 记录SQL（生产环境由 application-prod.yml 覆盖为 NoLogging）
      log-impl: org.apache.ibatis.logging.slf4j.Slf4jImpl
    global-config:
      db-config:
        id-type: auto
        logic-delete-field: deleted
        logic-delete-value: true
        logic-not-delete-value: false

  # 邮件配置（SMTP 服务器配置）
  # 注意：通知相关配置（启用状态、发件人等）应在后台"系统配置"中管理
  # 这里的 SMTP 配置仅作为兜底配置，建议通过环境变量或后台配置管理
  mail:
    host: ${SPRING_MAIL_HOST:smtp.example.com}
    port: ${SPRING_MAIL_PORT:587}
    username: ${SPRING_MAIL_USERNAME:}
    password: ${SPRING_MAIL_PASSWORD:}
    properties:
      mail:
        smtp:
          auth: true
          starttls:
            enable: true

  # Jackson配置
  jackson:
    date-format: yyyy-MM-dd HH:mm:ss
    time-zone: GMT+8
    default-property-inclusion: non_null

  # 文件上传配置（Spring层）
  servlet:
    multipart:
      enabled: true
      max-file-size: 10MB  # 单个文件最大大小
      max-request-size: 50MB  # 请求最大大小（支持多文件）
      file-size-threshold: 2MB  # 超过此大小使用临时文件

# 服务器配置
server:
  port: 8081
  servlet:
    context-path: /
  # 安全：隐藏服务器版本信息
  server-header: ""
  # 安全：不暴露错误详情到客户端
  error:
    include-stacktrace: never
    include-message: never
    include-binding-errors: never

# 应用版本配置（用于版本检查和升级提示）
app:
  version: 1.0.0
  version-check:
    dist-center:
      # 开发环境兜底读取同级目录 ../dist-center/projects/{project}/versions/latest.json
      project: ${APP_VERSION_DIST_CENTER_PROJECT:law-firm-clients}
      # 可选：直接指定 Dist Center latest.json 绝对路径
      latest-file: ${APP_VERSION_DIST_CENTER_LATEST_FILE:}
    # 软件正式运行时默认检查公网分发中心版本描述
    # 返回 JSON: {"version": "x.x.x", "releaseNotes": "...", "releaseUrl": "..."}
    url: ${APP_VERSION_CHECK_URL:https://install.albertzhan.top/projects/law-firm-clients/versions/latest.json}
    # GitHub 仓库（可选，格式: owner/repo，将从 GitHub Releases 获取最新版本）
    github-repo: ${APP_VERSION_GITHUB_REPO:}

# 应用配置
client-service:
  # 系统配置
  system:
    name: 客户服务系统
    version: ${app.version}
    base-url: http://localhost:8081
  
  # 通知配置
  # ⚠️ 重要提示：所有通知配置应在后台"系统配置"中管理，而非在此配置文件中
  # 这里的配置仅作为兜底默认值，实际配置优先从数据库 sys_config 表读取
  # 配置路径：管理后台 -> 系统配置
  notification:
    sms:
      enabled: false  # 应在后台配置：notification.sms.enabled
      provider: aliyun  # 应在后台配置：client-service.notification.sms.provider
      # 阿里云短信配置（应在后台配置）
      aliyun:
        access-key-id:   # 后台配置：client-service.notification.sms.aliyun.access-key-id
        access-key-secret:   # 后台配置：client-service.notification.sms.aliyun.access-key-secret
        sign-name:   # 后台配置：client-service.notification.sms.aliyun.sign-name
        template-code:   # 后台配置：client-service.notification.sms.aliyun.template-code
        endpoint: dysmsapi.aliyuncs.com  # 后台配置：client-service.notification.sms.aliyun.endpoint
      # 腾讯云短信配置（应在后台配置）
      tencent:
        secret-id:   # 后台配置：client-service.notification.sms.tencent.secret-id
        secret-key:   # 后台配置：client-service.notification.sms.tencent.secret-key
        app-id:   # 后台配置：client-service.notification.sms.tencent.app-id
        sign-name:   # 后台配置：client-service.notification.sms.tencent.sign-name
        template-id:   # 后台配置：client-service.notification.sms.tencent.template-id
        region: ap-beijing  # 后台配置：client-service.notification.sms.tencent.region
    wechat:
      enabled: false  # 应在后台配置：notification.wechat.enabled
      app-id:   # 后台配置：client-service.notification.wechat.app-id
      app-secret:   # 后台配置：client-service.notification.wechat.app-secret
      template-id:   # 后台配置：notification.wechat.template-id
      # AccessToken缓存配置（自动管理，无需手动配置） 
    email:
      enabled: false  # 应在后台配置：notification.email.enabled
      from: noreply@example.com  # 后台配置：client-service.notification.email.from
      from-name: 客户服务系统  # 后台配置：client-service.notification.email.from-name
    # 通知重试配置（可在后台配置，但通常使用默认值即可）
    retry:
      max-retries: 3  # 最大重试次数（默认3次）
      interval-minutes: 30  # 重试间隔（分钟，使用指数退避：30分钟、1小时、2小时）
  
  # 文件存储配置
  file:
    storage:
      type: local  # local, minio, oss
      local:
        path: /data/client-service/files
      minio:
        endpoint: ${MINIO_ENDPOINT:http://localhost:9000}
        access-key: ${MINIO_ACCESS_KEY:minioadmin}
        secret-key: ${MINIO_SECRET_KEY:minioadmin}
        bucket-name: ${MINIO_BUCKET:client-service}
      oss:
        endpoint: https://oss-cn-hangzhou.aliyuncs.com
        access-key-id: 
        access-key-secret: 
        bucket-name: client-service
    max-size: 10485760  # 最大文件大小（字节），默认10MB
    # 文件类型验证配置
    allowed-extensions: .pdf,.doc,.docx,.xls,.xlsx,.ppt,.pptx,.jpg,.jpeg,.png,.gif,.bmp,.txt,.zip,.rar  # 允许的文件扩展名（逗号分隔）
    validate-extension: true  # 是否启用文件扩展名验证
    validate-content: true  # 是否启用文件内容验证（文件头魔数）
    virus-scan:
      enabled: false  # 是否启用病毒扫描
      type: clamav  # 扫描器类型：clamav, none
      clamav:
        host: localhost  # ClamAV守护进程地址
        port: 3310  # ClamAV守护进程端口
        timeout: 5000  # 扫描超时时间（毫秒）
  
  # API配置
  api:
    token-length: 32  # 访问令牌长度
    token-expire-days: 30  # 访问令牌有效期（天）
  
  # JWT配置
  jwt:
    # 生产环境必须通过环境变量 CLIENT_SERVICE_JWT_SECRET 设置强密钥
    secret: ${CLIENT_SERVICE_JWT_SECRET:ClientServiceJwtSecretKey2024DevOnly}
    expiration-hours: ${CLIENT_SERVICE_JWT_EXPIRATION:24}  # Token过期时间（小时）
  
  # 安全配置
  security:
    # 登录失败配置
    max-failed-login-count: 5  # 最大登录失败次数（超过后锁定账户）
    lock-duration-minutes: 30  # 账户锁定时间（分钟）
    # 密码策略配置
    password:
      min-length: 8  # 密码最小长度
      require-letter: true  # 是否要求包含字母
      require-digit: true  # 是否要求包含数字
      require-special: false  # 是否要求包含特殊字符
    # 登录速率限制配置
    login-rate-limit:
      max-attempts-per-ip: 10  # 每个IP允许的最大登录尝试次数（15分钟内）
      attempt-window-minutes: 15  # IP登录尝试的时间窗口（分钟）
      ip-lock-duration-minutes: 30  # IP被锁定后的锁定时间（分钟）
    # 请求速率限制配置
    request-rate-limit:
      max-requests-per-minute: 60  # 每个IP允许的最大请求次数（1分钟内）
      max-requests-per-hour: 1000  # 每个IP允许的最大请求次数（1小时内）
      rate-limit-duration-minutes: 10  # IP被限制后的限制时间（分钟）
    # 验证码配置
    captcha:
      expire-minutes: 5  # 验证码有效期（分钟）
      length: 4  # 验证码长度
    # CSRF Token配置
    csrf-token:
      expire-hours: 24  # CSRF Token有效期（小时）
  
  # 访问日志配置
  access-log:
    retention-days: 90  # 访问日志保留天数（默认90天）
  
  # 律所管理系统回调配置
  # 用于将客户访问日志、下载日志等回调给律所系统
  callback:
    # 是否启用回调（默认启用）
    enabled: ${CLIENT_SERVICE_CALLBACK_ENABLED:true}
    # 律所管理系统的回调地址（必须配置，否则回调无法发送）
    # 示例: http://192.168.1.100:8080/api 或 http://law-firm-backend:8080/api
    law-firm-url: ${LAW_FIRM_CALLBACK_URL:}
    # 回调 API 密钥（用于律所系统验证回调请求的合法性）
    # 当律所系统无固定公网IP时，需要配置此密钥替代IP白名单验证
    # 密钥由双方协商确定，需与律所系统配置一致
    api-key: ${CALLBACK_API_KEY:}
    # 是否允许回调到内网地址（默认 true，企业内网部署场景）
    # 设为 false 时会启用 SSRF 防护，阻止回调到 localhost/192.168.x.x 等内网地址
    allow-internal: ${CALLBACK_ALLOW_INTERNAL:true}

# Actuator配置
management:
  endpoints:
    web:
      exposure:
        include: health,info  # 仅暴露必要端点，metrics/prometheus 通过运维内网访问
      base-path: /actuator
  endpoint:
    health:
      show-details: when-authorized
      show-components: when-authorized
    # 禁用可能泄露敏感信息的端点
    env:
      enabled: false
    configprops:
      enabled: false
    beans:
      enabled: false
    heapdump:
      enabled: false
    threaddump:
      enabled: false
  metrics:
    tags:
      application: ${spring.application.name}
    export:
      prometheus:
        enabled: true

# 日志配置
# 注意：详细配置在 logback-spring.xml 中
# 可以通过环境变量控制：
#   LOG_PATH: 日志文件路径（默认：logs）
#   LOG_FILE: 日志文件名（默认：client-service）
#   LOKI_URL: Loki服务地址（可选，用于直接发送日志到Loki）
logging:
  level:
    root: INFO
    com.clientservice: INFO  # 开发环境可手动改为 DEBUG，生产环境必须 INFO 或 WARN
  # logback-spring.xml 会覆盖这些配置
  # pattern:
  #   console: "%d{yyyy-MM-dd HH:mm:ss} [%thread] %-5level %logger{36} - %msg%n"
  #   file: "%d{yyyy-MM-dd HH:mm:ss} [%thread] %-5level %logger{36} - %msg%n"
  # file:
  #   name: logs/client-service.log
  #   max-size: 10MB
  #   max-history: 30

# SpringDoc配置
springdoc:
  api-docs:
    path: /v3/api-docs
    enabled: ${SPRINGDOC_ENABLED:true}  # 生产环境通过环境变量设为 false
  swagger-ui:
    path: /swagger-ui.html
    enabled: ${SPRINGDOC_ENABLED:true}  # 生产环境通过环境变量设为 false
