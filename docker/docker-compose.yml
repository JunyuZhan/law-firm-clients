version: '3.8'

services:
  # =====================================================
  # 1. 前端服务 (Nginx)
  # =====================================================
  nginx:
    image: 192.168.50.5:5050/albert/law-firm-clients:latest
    container_name: law-firm-clients-nginx
    restart: always
    ports:
      - "8080:80"
    command: ["nginx", "-g", "daemon off;"]
    depends_on:
      - backend

  # =====================================================
  # 2. 后端服务 (Spring Boot)
  # =====================================================
  backend:
    image: 192.168.50.5:5050/albert/law-firm-clients:latest
    container_name: law-firm-clients-backend
    restart: always
    command: ["java", "-jar", "app.jar"]
    environment:
      - SPRING_PROFILES_ACTIVE=prod
      - SPRING_DATASOURCE_URL=jdbc:postgresql://postgres:5432/client_service
      # 零配置启动：如果不提供密码，系统会使用安全的默认配置，后端自动建表并生成初始状态
      # - POSTGRES_PASSWORD=your_password
    depends_on:
      - postgres
      - redis

  # =====================================================
  # 3. 数据库 (PostgreSQL)
  # =====================================================
  postgres:
    image: postgres:15-alpine
    container_name: law-firm-clients-postgres
    restart: always
    environment:
      - POSTGRES_USER=postgres
      - POSTGRES_PASSWORD=${POSTGRES_PASSWORD:-postgres123}
      - POSTGRES_DB=client_service
    volumes:
      - postgres_data:/var/lib/postgresql/data

  # =====================================================
  # 4. 缓存 (Redis)
  # =====================================================
  redis:
    image: redis:7-alpine
    container_name: law-firm-clients-redis
    restart: always
    volumes:
      - redis_data:/data

volumes:
  postgres_data:
  redis_data: