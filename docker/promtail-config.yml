server:
  http_listen_port: 9080
  grpc_listen_port: 0

positions:
  filename: /tmp/positions.yaml

clients:
  - url: http://loki:3100/loki/api/v1/push

scrape_configs:
  - job_name: client-service
    static_configs:
      - targets:
          - localhost
        labels:
          job: client-service
          application: client-service
          __path__: /var/log/client-service/client-service-json-*.log
    pipeline_stages:
      - json:
          expressions:
            timestamp: timestamp
            level: level
            logger: logger_name
            message: message
            thread: thread_name
            application: application
            environment: environment
      - labels:
          level:
          application:
          environment:
      - timestamp:
          source: timestamp
          format: RFC3339
