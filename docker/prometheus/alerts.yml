# =====================================================
# Prometheus 告警规则配置
# 客户服务系统监控告警规则
# =====================================================

groups:
  - name: client-service-alerts
    interval: 30s
    rules:
      # =====================================================
      # 1. 服务可用性告警
      # =====================================================
      
      - alert: ServiceDown
        expr: up{job="client-service-backend"} == 0
        for: 1m
        labels:
          severity: critical
          service: client-service
        annotations:
          summary: "客户服务系统不可用"
          description: "客户服务系统已下线超过1分钟"
          runbook_url: "https://github.com/your-org/law-firm/docs/troubleshooting#service-down"

      - alert: HealthCheckFailed
        expr: |
          up{job="client-service-backend"} == 1 AND
          (
            rate(http_server_requests_seconds_count{job="client-service-backend",uri="/api/health",status!="200"}[5m]) > 0
            OR
            rate(http_server_requests_seconds_count{job="client-service-backend",uri="/api/health"}[5m]) == 0
          )
        for: 2m
        labels:
          severity: critical
          service: client-service
        annotations:
          summary: "健康检查失败"
          description: "健康检查端点返回非健康状态或无法访问超过2分钟"
          runbook_url: "https://github.com/your-org/law-firm/docs/troubleshooting#health-check-failed"

      # =====================================================
      # 2. 性能告警
      # =====================================================
      
      - alert: HighErrorRate
        expr: |
          (
            rate(http_server_requests_seconds_count{job="client-service-backend",status=~"5.."}[5m])
            /
            rate(http_server_requests_seconds_count{job="client-service-backend"}[5m])
          ) > 0.05
        for: 5m
        labels:
          severity: warning
          service: client-service
        annotations:
          summary: "HTTP错误率过高"
          description: "5xx错误率超过5%，当前值: {{ $value | humanizePercentage }}"
          runbook_url: "https://github.com/your-org/law-firm/docs/troubleshooting#high-error-rate"

      - alert: SlowAPIResponse
        expr: |
          (
            rate(http_server_requests_seconds_sum{job="client-service-backend",uri="/api/matter/receive"}[5m])
            /
            rate(http_server_requests_seconds_count{job="client-service-backend",uri="/api/matter/receive"}[5m])
          ) > 3
        for: 5m
        labels:
          severity: warning
          service: client-service
          api: matter-receive
        annotations:
          summary: "接收项目数据接口响应慢"
          description: "接收项目数据接口平均响应时间超过3秒，当前值: {{ $value | humanizeDuration }}"
          runbook_url: "https://github.com/your-org/law-firm/docs/troubleshooting#slow-api"

      - alert: SlowPortalAPI
        expr: |
          (
            rate(http_server_requests_seconds_sum{job="client-service-backend",uri=~"/portal/api/matter/.*"}[5m])
            /
            rate(http_server_requests_seconds_count{job="client-service-backend",uri=~"/portal/api/matter/.*"}[5m])
          ) > 2
        for: 5m
        labels:
          severity: warning
          service: client-service
          api: portal-detail
        annotations:
          summary: "客户门户接口响应慢"
          description: "客户门户获取项目详情接口平均响应时间超过2秒，当前值: {{ $value | humanizeDuration }}"

      - alert: SlowFileUpload
        expr: |
          (
            rate(http_server_requests_seconds_sum{job="client-service-backend",uri="/api/client/files/upload"}[5m])
            /
            rate(http_server_requests_seconds_count{job="client-service-backend",uri="/api/client/files/upload"}[5m])
          ) > 5
        for: 5m
        labels:
          severity: warning
          service: client-service
          api: file-upload
        annotations:
          summary: "文件上传接口响应慢"
          description: "文件上传接口平均响应时间超过5秒，当前值: {{ $value | humanizeDuration }}"

      # =====================================================
      # 3. 资源使用告警
      # =====================================================
      
      - alert: HighMemoryUsage
        expr: |
          (
            jvm_memory_used_bytes{job="client-service-backend",area="heap"}
            /
            jvm_memory_max_bytes{job="client-service-backend",area="heap"}
          ) > 0.85
        for: 5m
        labels:
          severity: warning
          service: client-service
          resource: memory
        annotations:
          summary: "JVM堆内存使用率过高"
          description: "JVM堆内存使用率超过85%，当前值: {{ $value | humanizePercentage }}"
          runbook_url: "https://github.com/your-org/law-firm/docs/troubleshooting#high-memory"

      - alert: CriticalMemoryUsage
        expr: |
          (
            jvm_memory_used_bytes{job="client-service-backend",area="heap"}
            /
            jvm_memory_max_bytes{job="client-service-backend",area="heap"}
          ) > 0.95
        for: 2m
        labels:
          severity: critical
          service: client-service
          resource: memory
        annotations:
          summary: "JVM堆内存使用率严重过高"
          description: "JVM堆内存使用率超过95%，当前值: {{ $value | humanizePercentage }}，可能导致OOM"
          runbook_url: "https://github.com/your-org/law-firm/docs/troubleshooting#critical-memory"

      - alert: HighCPUUsage
        expr: |
          process_cpu_usage{job="client-service-backend"} > 0.8
        for: 5m
        labels:
          severity: warning
          service: client-service
          resource: cpu
        annotations:
          summary: "CPU使用率过高"
          description: "CPU使用率超过80%，当前值: {{ $value | humanizePercentage }}"

      - alert: HighThreadCount
        expr: |
          jvm_threads_live_threads{job="client-service-backend"} > 200
        for: 5m
        labels:
          severity: warning
          service: client-service
          resource: threads
        annotations:
          summary: "线程数过多"
          description: "活跃线程数超过200，当前值: {{ $value }}"

      # =====================================================
      # 4. 数据库连接池告警
      # =====================================================
      
      - alert: HighDatabaseConnections
        expr: |
          hikari_connections_active{job="client-service-backend"}
          /
          hikari_connections_max{job="client-service-backend"} > 0.8
        for: 5m
        labels:
          severity: warning
          service: client-service
          resource: database
        annotations:
          summary: "数据库连接池使用率过高"
          description: "数据库连接池使用率超过80%，当前值: {{ $value | humanizePercentage }}"

      - alert: DatabaseConnectionPending
        expr: |
          hikari_connections_pending{job="client-service-backend"} > 5
        for: 2m
        labels:
          severity: warning
          service: client-service
          resource: database
        annotations:
          summary: "数据库连接等待数过多"
          description: "等待数据库连接的请求数超过5，当前值: {{ $value }}"

      # =====================================================
      # 5. 业务指标告警
      # =====================================================
      
      - alert: LowAPIRequestRate
        expr: |
          rate(http_server_requests_seconds_count{job="client-service-backend",uri!~"/actuator.*"}[5m]) < 0.1
        for: 10m
        labels:
          severity: info
          service: client-service
        annotations:
          summary: "API请求量过低"
          description: "API请求量低于0.1 QPS，可能表示服务异常或流量异常"

      - alert: HighFileUploadFailureRate
        expr: |
          (
            rate(http_server_requests_seconds_count{job="client-service-backend",uri="/api/client/files/upload",status=~"4..|5.."}[5m])
            /
            rate(http_server_requests_seconds_count{job="client-service-backend",uri="/api/client/files/upload"}[5m])
          ) > 0.1
        for: 5m
        labels:
          severity: warning
          service: client-service
          api: file-upload
        annotations:
          summary: "文件上传失败率过高"
          description: "文件上传失败率超过10%，当前值: {{ $value | humanizePercentage }}"

      # =====================================================
      # 6. GC告警
      # =====================================================
      
      - alert: FrequentGC
        expr: |
          rate(jvm_gc_pause_seconds_count{job="client-service-backend"}[5m]) > 10
        for: 5m
        labels:
          severity: warning
          service: client-service
          resource: gc
        annotations:
          summary: "GC频率过高"
          description: "GC频率超过10次/分钟，当前值: {{ $value }} 次/分钟"

      - alert: LongGCPause
        expr: |
          rate(jvm_gc_pause_seconds_sum{job="client-service-backend"}[5m]) > 1
        for: 5m
        labels:
          severity: warning
          service: client-service
          resource: gc
        annotations:
          summary: "GC暂停时间过长"
          description: "GC暂停总时间超过1秒/分钟，当前值: {{ $value | humanizeDuration }}"
