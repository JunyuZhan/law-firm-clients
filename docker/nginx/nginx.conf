worker_processes auto;
error_log /var/log/nginx/error.log warn;
pid /tmp/nginx.pid;

events {
    worker_connections 1024;
    use epoll;
    multi_accept on;
}

http {
    include /etc/nginx/mime.types;
    default_type application/octet-stream;

    log_format main '$remote_addr - $remote_user [$time_local] "$request" '
                    '$status $body_bytes_sent "$http_referer" '
                    '"$http_user_agent" "$http_x_forwarded_for"';

    access_log /var/log/nginx/access.log main;

    sendfile on;
    tcp_nopush on;
    tcp_nodelay on;
    keepalive_timeout 65;
    types_hash_max_size 2048;

    # Gzip 压缩
    gzip on;
    gzip_vary on;
    gzip_proxied any;
    gzip_comp_level 6;
    gzip_types text/plain text/css text/xml application/json application/javascript 
               application/xml application/xml+rss text/javascript application/x-javascript;

    # 上传文件大小限制
    client_max_body_size 50M;

    # 请求频率限制（防 DDoS / 暴力破解）
    limit_req_zone $binary_remote_addr zone=api_limit:10m rate=20r/s;
    limit_req_zone $binary_remote_addr zone=login_limit:10m rate=5r/m;
    limit_req_status 429;

    # 上游服务配置
    upstream backend {
        server app:8081;
        keepalive 32;
    }

    # MinIO 说明：
    # - API (9000) 仅内部网络访问，后端直接调用
    # - Console (9001) 直接暴露端口，运维通过 http://host:9001 访问

    # OnlyOffice 上游（如果启用）
    # upstream onlyoffice {
    #     server onlyoffice:80;
    #     keepalive 32;
    # }

    server {
        listen 8080;
        server_name _;

        # 安全响应头
        add_header X-Content-Type-Options "nosniff" always;
        add_header X-XSS-Protection "1; mode=block" always;
        add_header Referrer-Policy "strict-origin-when-cross-origin" always;
        add_header Permissions-Policy "camera=(), microphone=(), geolocation=(), payment=()" always;
        add_header Content-Security-Policy "default-src 'self'; script-src 'self' 'unsafe-inline' 'unsafe-eval' https://static.cloudflareinsights.com; style-src 'self' 'unsafe-inline' https://fonts.googleapis.com; img-src 'self' data: blob:; font-src 'self' data: https://fonts.gstatic.com; connect-src 'self' https://cloudflareinsights.com https://static.cloudflareinsights.com;" always;
        # HSTS（外网 HTTPS 访问时由上层反向代理添加，此处不重复设置）

        # 静态资源缓存（JS/CSS/图片等）
        location ~* \.(js|css|png|jpg|jpeg|gif|ico|svg|woff|woff2|ttf|eot)$ {
            root /usr/share/nginx/html;
            expires 7d;
            add_header Cache-Control "public, immutable";
        }

        # 前端静态文件（SPA 路由支持）
        location / {
            root /usr/share/nginx/html;
            index index.html;
            try_files $uri $uri/ /index.html;
            # 安全头需在 location 块中重复声明（nginx 特性：location 中的 add_header 会覆盖 server 级别）
            add_header X-Frame-Options "SAMEORIGIN" always;
            add_header X-Content-Type-Options "nosniff" always;
            add_header X-XSS-Protection "1; mode=block" always;
            add_header Referrer-Policy "strict-origin-when-cross-origin" always;
            add_header Permissions-Policy "camera=(), microphone=(), geolocation=(), payment=()" always;
            add_header Content-Security-Policy "default-src 'self'; script-src 'self' 'unsafe-inline' 'unsafe-eval' https://static.cloudflareinsights.com; style-src 'self' 'unsafe-inline' https://fonts.googleapis.com; img-src 'self' data: blob:; font-src 'self' data: https://fonts.gstatic.com; connect-src 'self' https://cloudflareinsights.com https://static.cloudflareinsights.com;" always;
        }

        # 登录接口频率限制（防暴力破解）
        location /api/auth/login {
            limit_req zone=login_limit burst=3 nodelay;
            proxy_pass http://backend/api/auth/login;
            proxy_http_version 1.1;
            proxy_set_header Host $host;
            proxy_set_header X-Real-IP $remote_addr;
            proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
            proxy_set_header X-Forwarded-Proto $scheme;
            proxy_set_header Connection "";
        }

        # 屏蔽 Actuator 和 Swagger 等敏感路径的外部访问
        location /api/actuator {
            deny all;
            return 404;
        }
        location /api/v3/api-docs {
            deny all;
            return 404;
        }
        location /api/swagger-ui {
            deny all;
            return 404;
        }

        # 后端 API 代理
        location /api/ {
            limit_req zone=api_limit burst=40 nodelay;
            proxy_pass http://backend/api/;
            proxy_http_version 1.1;
            proxy_set_header Host $host;
            proxy_set_header X-Real-IP $remote_addr;
            proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
            proxy_set_header X-Forwarded-Proto $scheme;
            proxy_set_header Connection "";

            # WebSocket 支持（如果需要）
            proxy_set_header Upgrade $http_upgrade;
            proxy_set_header Connection "upgrade";

            # 超时设置
            proxy_connect_timeout 60s;
            proxy_send_timeout 60s;
            proxy_read_timeout 60s;

            # 禁用缓存 API 响应
            proxy_no_cache 1;
            proxy_cache_bypass 1;
        }

        # 客户门户 API 代理
        location /portal/api/ {
            proxy_pass http://backend/portal/api/;
            proxy_http_version 1.1;
            proxy_set_header Host $host;
            proxy_set_header X-Real-IP $remote_addr;
            proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
            proxy_set_header X-Forwarded-Proto $scheme;
            proxy_set_header Connection "";

            # 超时设置
            proxy_connect_timeout 60s;
            proxy_send_timeout 60s;
            proxy_read_timeout 60s;

            # 禁用缓存 API 响应
            proxy_no_cache 1;
            proxy_cache_bypass 1;
        }

        # ========== OnlyOffice 代理（如果启用文档预览/编辑）==========
        # 取消注释以启用，同时需要取消 upstream onlyoffice 的注释
        # 
        # 解决的问题：
        # 1. 跨域 (CORS)：通过同源代理避免
        # 2. 混合内容：使用相同协议 (HTTP/HTTPS)
        # 3. X-Frame-Options：允许 iframe 嵌入
        #
        # location /onlyoffice/ {
        #     proxy_pass http://onlyoffice/;
        #     proxy_http_version 1.1;
        #     proxy_set_header Host $http_host;
        #     proxy_set_header X-Real-IP $remote_addr;
        #     proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
        #     proxy_set_header X-Forwarded-Proto $scheme;
        #     proxy_set_header X-Forwarded-Host $http_host;
        #     
        #     # WebSocket 支持（OnlyOffice 实时协作需要）
        #     proxy_set_header Upgrade $http_upgrade;
        #     proxy_set_header Connection "upgrade";
        #     
        #     # 超时设置（文档转换可能耗时）
        #     proxy_connect_timeout 300s;
        #     proxy_send_timeout 300s;
        #     proxy_read_timeout 300s;
        #     
        #     # 禁用缓冲（流式传输）
        #     proxy_buffering off;
        #     
        #     # 不设置 X-Frame-Options，允许 iframe 嵌入
        #     # 注意：OnlyOffice 自身有 JWT 认证保护
        # }

        # 健康检查端点
        location /health {
            access_log off;
            return 200 "OK";
            add_header Content-Type text/plain;
        }

        # 错误页面
        error_page 500 502 503 504 /50x.html;
        location = /50x.html {
            root /usr/share/nginx/html;
        }
    }
}
