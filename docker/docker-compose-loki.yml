version: '3.8'

services:
  # Loki日志收集服务
  loki:
    image: grafana/loki:2.9.4
    container_name: client-service-loki
    ports:
      - "127.0.0.1:3100:3100"  # 仅本机访问，防止未认证暴露
    command: -config.file=/etc/loki/local-config.yaml
    volumes:
      - loki_data:/loki
    networks:
      - client-service-network
    healthcheck:
      test: ["CMD", "wget", "--quiet", "--tries=1", "--spider", "http://localhost:3100/ready"]
      interval: 10s
      timeout: 5s
      retries: 5

  # Promtail日志收集代理
  promtail:
    image: grafana/promtail:2.9.4
    container_name: client-service-promtail
    volumes:
      - ../backend/logs:/var/log/client-service:ro
      - ./promtail-config.yml:/etc/promtail/config.yml:ro
    command: -config.file=/etc/promtail/config.yml
    depends_on:
      - loki
    networks:
      - client-service-network

  # Grafana可视化
  grafana:
    image: grafana/grafana:10.3.1
    container_name: client-service-grafana
    ports:
      - "127.0.0.1:3000:3000"  # 仅本机访问，通过 SSH 隧道远程管理
    environment:
      - GF_SECURITY_ADMIN_USER=admin
      - GF_SECURITY_ADMIN_PASSWORD=${GRAFANA_PASSWORD:?请在 .env 中设置 GRAFANA_PASSWORD}
      - GF_INSTALL_PLUGINS=grafana-piechart-panel
      - GF_USERS_ALLOW_SIGN_UP=false
      - GF_AUTH_ANONYMOUS_ENABLED=false
    volumes:
      - grafana_data:/var/lib/grafana
      - ./grafana-datasources.yml:/etc/grafana/provisioning/datasources/datasources.yml:ro
    depends_on:
      - loki
    networks:
      - client-service-network
    healthcheck:
      test: ["CMD", "wget", "--quiet", "--tries=1", "--spider", "http://localhost:3000/api/health"]
      interval: 10s
      timeout: 5s
      retries: 5

networks:
  client-service-network:
    driver: bridge

volumes:
  loki_data:
  grafana_data:
