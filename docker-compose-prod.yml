# =====================================================
# 客户服务系统 Docker Compose 部署配置 (Release 环境)
# =====================================================
name: law-firm-clients

x-logging: &default-logging
  driver: json-file
  options:
    max-size: "10m"
    max-file: "3"

services:
  # ========== Nginx 入口（唯一对外暴露端口）==========
  nginx:
    image: 192.168.50.5:5050/albert/law-firm-clients:v1.0.7
    container_name: law-firm-clients-nginx
    ports:
      - "${NGINX_PORT:-8080}:8080"
    networks:
      - client-service-network
    restart: unless-stopped
    logging: *default-logging
    # 覆盖原镜像的启动命令，因为当前仓库只有一个单体镜像
    # 前端静态文件由 nginx 托管，但需要把镜像里的 nginx 配置提出来用
    # 由于是全栈单体镜像，这里运行 nginx 进程
    command: ["nginx", "-g", "daemon off;"]
    healthcheck:
      test: ["CMD", "curl", "-f", "http://localhost:8080/health"]
      interval: 30s
      timeout: 5s
      retries: 3

  # ========== 后端应用 ==========
  app:
    image: 192.168.50.5:5050/albert/law-firm-clients:v1.0.7
    container_name: law-firm-clients-backend
    expose:
      - "8081"
    environment:
      SPRING_PROFILES_ACTIVE: prod
      SPRING_DATASOURCE_URL: jdbc:postgresql://postgres:5432/client_service
      SPRING_DATASOURCE_USERNAME: ${POSTGRES_USER:-postgres}
      SPRING_DATASOURCE_PASSWORD: ${POSTGRES_PASSWORD:-postgres123}
      SPRING_REDIS_HOST: redis
      SPRING_REDIS_PORT: 6379
      SPRING_REDIS_PASSWORD: ${REDIS_PASSWORD:-}
      BASE_URL: ${BASE_URL:-http://localhost}
      CLIENT_SERVICE_JWT_SECRET: ${JWT_SECRET:-your_super_secret_jwt_key_that_is_very_long_and_secure}
      CLIENT_SERVICE_JWT_EXPIRATION: ${JWT_EXPIRATION:-24}
      FILE_STORAGE_TYPE: ${FILE_STORAGE_TYPE:-local}
      FILE_STORAGE_PATH: /data/client-service/files
    volumes:
      - client_service_file_storage:/data/client-service/files
      - client_service_app_logs:/app/logs
    depends_on:
      postgres:
        condition: service_healthy
      redis:
        condition: service_healthy
    networks:
      - client-service-network
    restart: unless-stopped
    logging: *default-logging
    # 覆盖命令运行后端 jar
    command: ["sh", "-c", "exec java -Djava.security.egd=file:/dev/./urandom -Dspring.profiles.active=$${SPRING_PROFILES_ACTIVE:-prod} -jar app.jar"]
    healthcheck:
      test: ["CMD", "curl", "-f", "http://localhost:8081/api/health"]
      interval: 30s
      timeout: 10s
      retries: 3
      start_period: 40s

  # ========== PostgreSQL 数据库 ==========
  postgres:
    image: postgres:15-alpine
    container_name: law-firm-clients-postgres
    expose:
      - "5432"
    environment:
      POSTGRES_DB: client_service
      POSTGRES_USER: ${POSTGRES_USER:-postgres}
      POSTGRES_PASSWORD: ${POSTGRES_PASSWORD:-postgres123}
    volumes:
      - client_service_postgres_data:/var/lib/postgresql/data
    networks:
      - client-service-network
    restart: unless-stopped
    logging: *default-logging
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U ${POSTGRES_USER:-postgres}"]
      interval: 10s
      timeout: 5s
      retries: 5

  # ========== Redis 缓存 ==========
  redis:
    image: redis:7-alpine
    container_name: law-firm-clients-redis
    expose:
      - "6379"
    command: >
      redis-server 
      --appendonly yes 
      ${REDIS_PASSWORD:+--requirepass ${REDIS_PASSWORD}}
    volumes:
      - client_service_redis_data:/data
    networks:
      - client-service-network
    restart: unless-stopped
    logging: *default-logging
    healthcheck:
      test: ["CMD-SHELL", "redis-cli ${REDIS_PASSWORD:+-a $REDIS_PASSWORD} ping | grep -q PONG"]
      interval: 10s
      timeout: 3s
      retries: 5

networks:
  client-service-network:
    driver: bridge

volumes:
  client_service_postgres_data:
  client_service_redis_data:
  client_service_file_storage:
  client_service_app_logs:
